name: city_rescue
description: CityRescue - Civic Tech Platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  lottie: ^3.1.2                    # ← For animated icons (login pin + onboarding)
  flutter_map: ^7.0.0               # ← We'll use this for the LiveMap (Leaflet equivalent)
  latlong2: ^0.9.1              # ← For handling lat/lng coordinates with flutter_map
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/location_pin.json     
    - assets/animations/camera_scan.json
    - assets/animations/orbiting_icon.json
    - assets/animations/onboarding_pin.json

