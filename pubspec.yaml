name: city_rescue
description: CityRescue - Civic Tech Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  lottie: ^3.1.2
  mapbox_maps_flutter: ^2.3.0      # ← Replaces flutter_map
  geolocator: ^12.0.0
  flutter_svg: ^2.2.4
  camera: ^0.10.6
  http: ^1.2.0  
  google_mlkit_image_labeling: ^0.14.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/location_pin.json
    - assets/animations/camera_scan.json
    - assets/animations/orbiting_icon.json
    - assets/animations/onboarding_pin.json